name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - name: ruff check
        run: ruff check --output-format=github .
      - name: ruff format
        run: ruff format --check .
      - name: Dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: mypy

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10 is the contract: it is what python:3.10-slim ships in the image.
        # The newer legs are advisory early warning for future base-image bumps.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    continue-on-error: ${{ matrix.python-version != '3.10' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: pytest -m "not docker" --cov --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        if: matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  docker:
    name: Image build and container tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ms-denovo-db-utils:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Container tests
        run: pytest -m docker
